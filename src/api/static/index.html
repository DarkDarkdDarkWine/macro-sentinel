<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Macro Sentinel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.02em; }
    h1 span { color: #60a5fa; }

    .subtitle { font-size: 0.8rem; color: #64748b; margin-top: 2px; }

    .btn {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #334155; cursor: not-allowed; }

    .source-toggle { display: flex; gap: 8px; align-items: center; }
    .source-toggle label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
      color: #94a3b8;
      cursor: pointer;
    }
    .source-toggle input[type=checkbox] { accent-color: #60a5fa; }

    #status {
      font-size: 0.8rem;
      color: #64748b;
      margin-bottom: 20px;
      min-height: 1.2em;
    }
    #status.loading { color: #facc15; }
    #status.error   { color: #f87171; }
    #status.done    { color: #4ade80; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1e293b;
      border-radius: 10px;
      padding: 18px;
      border: 1px solid #334155;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 14px;
    }

    /* VIX big number */
    .vix-block { text-align: center; padding: 8px 0; }
    .vix-number { font-size: 3rem; font-weight: 700; }
    .vix-label  { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }
    .vix-low    { color: #4ade80; }
    .vix-mid    { color: #facc15; }
    .vix-high   { color: #f97316; }
    .vix-extreme{ color: #f87171; }

    /* Index rows */
    .index-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #334155;
      font-size: 0.85rem;
    }
    .index-row:last-child { border-bottom: none; }
    .index-name  { color: #cbd5e1; }
    .index-price { font-variant-numeric: tabular-nums; }
    .change-pos  { color: #4ade80; font-size: 0.78rem; }
    .change-neg  { color: #f87171; font-size: 0.78rem; }
    .change-neu  { color: #94a3b8; font-size: 0.78rem; }

    /* Macro series */
    .macro-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #334155;
      font-size: 0.85rem;
    }
    .macro-row:last-child { border-bottom: none; }
    .macro-name  { color: #cbd5e1; max-width: 70%; }
    .macro-value { font-variant-numeric: tabular-nums; color: #93c5fd; }

    /* News */
    .news-balance {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 0.78rem;
    }
    .badge-west { background: #1e40af; color: #93c5fd; padding: 2px 8px; border-radius: 99px; }
    .badge-east { background: #7c2d12; color: #fca5a5; padding: 2px 8px; border-radius: 99px; }

    .article-item {
      padding: 7px 0;
      border-bottom: 1px solid #334155;
      font-size: 0.82rem;
    }
    .article-item:last-child { border-bottom: none; }
    .article-title { color: #e2e8f0; line-height: 1.4; }
    .article-meta  { color: #64748b; font-size: 0.72rem; margin-top: 3px; display: flex; gap: 8px; }
    .bias-west { color: #93c5fd; }
    .bias-east { color: #fca5a5; }
    .bias-unknown { color: #64748b; }

    .placeholder {
      color: #475569;
      font-size: 0.85rem;
      text-align: center;
      padding: 32px 0;
    }

    .fetched-at { font-size: 0.7rem; color: #475569; margin-top: 10px; text-align: right; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Macro <span>Sentinel</span></h1>
    <div class="subtitle">宏观哨兵 · 全球事件 + 市场监控 + 投资信号</div>
  </div>
  <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
    <div class="source-toggle">
      <label><input type="checkbox" id="chk-market" checked> 市场</label>
      <label><input type="checkbox" id="chk-macro" checked> 宏观</label>
      <label><input type="checkbox" id="chk-news" checked> 新闻</label>
      <button class="btn" id="btn-collect" onclick="collect()">采集数据</button>
    </div>
  </div>
</header>

<div id="status">尚未采集数据，点击「采集数据」开始</div>

<div class="grid" id="grid">
  <div class="card"><div class="placeholder">市场数据将显示在这里</div></div>
  <div class="card"><div class="placeholder">宏观指标将显示在这里</div></div>
  <div class="card"><div class="placeholder">全球新闻将显示在这里</div></div>
</div>

<script>
  function vixClass(v) {
    if (v < 15) return 'vix-low';
    if (v < 25) return 'vix-mid';
    if (v < 35) return 'vix-high';
    return 'vix-extreme';
  }

  function vixLabel(v) {
    if (v < 15) return '市场平静';
    if (v < 25) return '正常波动';
    if (v < 35) return '市场紧张';
    return '极度恐慌';
  }

  function changeClass(pct) {
    if (pct > 0) return 'change-pos';
    if (pct < 0) return 'change-neg';
    return 'change-neu';
  }

  function changeStr(pct) {
    const sign = pct >= 0 ? '+' : '';
    return `${sign}${pct.toFixed(2)}%`;
  }

  function fmtTime(iso) {
    return new Date(iso).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
  }

  function renderMarket(data) {
    const vixCls = vixClass(data.vix);
    const rows = (items) => items.map(i => `
      <div class="index-row">
        <span class="index-name">${i.name}</span>
        <span>
          <span class="index-price">${i.price.toLocaleString()}</span>
          <span class="${changeClass(i.change_pct)}"> ${changeStr(i.change_pct)}</span>
        </span>
      </div>`).join('');

    return `
      <div class="card-title">📈 市场数据</div>
      <div class="vix-block">
        <div class="vix-number ${vixCls}">${data.vix.toFixed(1)}</div>
        <div class="vix-label">VIX 恐慌指数 · ${vixLabel(data.vix)}</div>
      </div>
      <div style="margin-top:14px;">
        <div class="card-title" style="margin-bottom:8px;">主要指数</div>
        ${rows(data.indices)}
      </div>
      <div style="margin-top:12px;">
        <div class="card-title" style="margin-bottom:8px;">大宗商品</div>
        ${rows(data.commodities)}
      </div>
      <div style="margin-top:12px;">
        <div class="card-title" style="margin-bottom:8px;">汇率</div>
        ${rows(data.fx_rates)}
      </div>
      <div class="fetched-at">采集于 ${fmtTime(data.fetched_at)}</div>`;
  }

  function renderMacro(data) {
    const rows = data.series.map(s => `
      <div class="macro-row">
        <span class="macro-name">${s.name}</span>
        <span class="macro-value">${s.value.toFixed(2)} <small style="color:#64748b">${s.unit}</small></span>
      </div>`).join('');

    return `
      <div class="card-title">🏦 宏观指标（FRED）</div>
      ${rows}
      <div class="fetched-at">采集于 ${fmtTime(data.fetched_at)}</div>`;
  }

  function renderNews(data) {
    const biasClass = (b) => b === 'western' ? 'bias-west' : b === 'eastern' ? 'bias-east' : 'bias-unknown';
    const biasLabel = (b) => b === 'western' ? '西方' : b === 'eastern' ? '东方' : '未知';

    const articles = data.articles.slice(0, 20).map(a => `
      <div class="article-item">
        <div class="article-title">
          <a href="${a.url}" target="_blank" style="color:inherit;text-decoration:none;">${a.title}</a>
        </div>
        <div class="article-meta">
          <span>${a.source_domain}</span>
          <span class="${biasClass(a.media_bias)}">${biasLabel(a.media_bias)}视角</span>
          <span>${a.language}</span>
        </div>
      </div>`).join('');

    return `
      <div class="card-title">🌐 全球新闻（GDELT）</div>
      <div class="news-balance">
        <span class="badge-west">西方 ${data.western_count}</span>
        <span class="badge-east">东方 ${data.eastern_count}</span>
        <span style="color:#64748b;font-size:0.75rem;">共 ${data.articles.length} 篇</span>
      </div>
      ${articles}
      <div class="fetched-at">采集于 ${fmtTime(data.fetched_at)}</div>`;
  }

  async function collect() {
    const btn = document.getElementById('btn-collect');
    const status = document.getElementById('status');
    const grid = document.getElementById('grid');

    const sources = ['market', 'macro', 'news']
      .filter(s => document.getElementById(`chk-${s}`).checked)
      .join(',');

    if (!sources) {
      status.className = 'error';
      status.textContent = '请至少选择一个数据源';
      return;
    }

    btn.disabled = true;
    status.className = 'loading';
    status.textContent = '正在采集数据，请稍候…（市场和宏观数据约需 10-20 秒）';
    grid.innerHTML = '';

    try {
      const res = await fetch(`/api/collect?sources=${sources}`);
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail?.error || `HTTP ${res.status}`);
      }
      const data = await res.json();

      const cards = [];
      if (data.market) cards.push(`<div class="card">${renderMarket(data.market)}</div>`);
      if (data.macro)  cards.push(`<div class="card">${renderMacro(data.macro)}</div>`);
      if (data.news)   cards.push(`<div class="card">${renderNews(data.news)}</div>`);
      grid.innerHTML = cards.join('');

      status.className = 'done';
      status.textContent = `✓ 采集完成 · ${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}`;
    } catch (e) {
      status.className = 'error';
      status.textContent = `采集失败：${e.message}`;
      grid.innerHTML = '<div class="card"><div class="placeholder">采集出错，请查看控制台日志</div></div>';
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
